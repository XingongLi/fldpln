name: fldpln_fim
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.9
  # Use compatible versions instead of strict pins
  - hdf5>=1.14.3,<1.14.4
  - h5py
  - gdal=3.9.0
  - libgdal=3.9.0
  
  # Geospatial & Multidimensional Data
  - geopandas=0.14.4
  - rasterio=1.3.10
  - fiona
  - shapely
  - pyproj
  
  # Data Science & Analysis
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - dask
  - pyarrow
  - fastparquet
  
  # Visualization & Interactive Tools
  - matplotlib-base
  - folium
  - bokeh
  - jupyterlab
  - ipykernel
  
  # Utilities
  - pydantic
  - requests
  - tqdm
  - openpyxl
  
  # Pip-installed packages
  - pip
